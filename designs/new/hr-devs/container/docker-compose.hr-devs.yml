# docker-compose.hr-devs.yml (*FR:Brunel*)
#
# hr-devs team container — SvelteKit + Cloudflare D1 development team.
#
# Usage:
#   docker compose -f docker-compose.hr-devs.yml build
#   docker compose -f docker-compose.hr-devs.yml up -d
#   docker compose -f docker-compose.hr-devs.yml down          # stop, keep volumes
#   docker compose -f docker-compose.hr-devs.yml down -v       # stop + wipe volumes
#
# Container layout:
#   User:       ai-teams  (uid=1000)
#   $HOME:      /home/ai-teams/
#   ~/.claude/: /home/ai-teams/.claude      → hr-claude-home (Claude state)
#   Workspace:  /home/ai-teams/workspace    → hr-repo (named volume)
#     ├── hr-platform/   — main working repo (Eesti-Raudtee/hr-platform)
#     └── dev-toolkit/   — MCP servers + standards (Eesti-Raudtee/dev-toolkit)
#   Dynamics:   /home/ai-teams/dynamics-data → bind mount (read-only from host)
#
# Ports (network_mode: host — bind directly on host, no port mapping):
#   2225  — SSH (ai-teams user, pubkey auth, auto-tmux on login)
#   5178  — Vite dev server (start with: npm run dev -- --port 5178)
#   8787  — Wrangler dev server (default wrangler dev port)
#
# Port allocation on RC server (100.96.54.170):
#   2222 / 5173  — apex-research (live)
#   2223 / 5175  — polyphony-dev (live)
#   2224 / 5177  — entu-research (live)
#   2225 / 5178  — hr-devs  (this file)
#
# Connect: ssh -i ~/.ssh/id_ed25519_hr_devs -p 2225 ai-teams@100.96.54.170

services:
  hr-devs:
    build:
      context: .
      dockerfile: Dockerfile.hr-devs
      # network: host required on WARP-protected hosts (RC server).
      # Without this, Docker build uses bridge network — not routed through WARP,
      # so apt-get update fails to reach Ubuntu repos.
      network: host
      args:
        GIT_USER_NAME: "${GIT_USER_NAME:-hr-devs}"
        GIT_USER_EMAIL: "${GIT_USER_EMAIL:-mihkel.putrinsh@evr.ee}"
    image: hr-devs-claude:latest
    container_name: hr-devs
    hostname: hr-devs
    # network_mode: host required on WARP-protected hosts (same as apex/polyphony/entu).
    # Bridge networking can't resolve DNS or route traffic through the WARP tunnel.
    # Port mapping is ignored — services bind directly to host ports.
    network_mode: host
    environment:
      - HOME=/home/ai-teams
      - TZ=Europe/Tallinn
      - REPO_URL=${REPO_URL:-https://github.com/Eesti-Raudtee/hr-platform.git}
      - TOOLKIT_URL=${TOOLKIT_URL:-https://github.com/Eesti-Raudtee/dev-toolkit.git}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1
      - TEAM_NAME=${TEAM_NAME:-hr-devs}
      # SSH public key(s) for ai-teams user. Injected into authorized_keys by entrypoint.
      - SSH_PUBLIC_KEY=${SSH_PUBLIC_KEY:-}
      - SSH_PUBLIC_KEY_2=${SSH_PUBLIC_KEY_2:-}
      # Cloudflare — required for Wrangler deploys and D1 operations
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID}
      # Atlassian — required for Jira MCP server
      - ATLASSIAN_BASE_URL=${ATLASSIAN_BASE_URL:-https://eestiraudtee.atlassian.net}
      - ATLASSIAN_EMAIL=${ATLASSIAN_EMAIL}
      - ATLASSIAN_API_TOKEN=${ATLASSIAN_API_TOKEN}
      # NODE_EXTRA_CA_CERTS: Node.js does NOT use the system CA store.
      # Must point to the WARP CA cert for Claude Code to trust HTTPS on WARP hosts.
      # Matches the bind-mount target path below.
      - NODE_EXTRA_CA_CERTS=/opt/warp-ca.pem
      # Git attribution
      - GIT_USER_NAME=${GIT_USER_NAME:-hr-devs}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-mihkel.putrinsh@evr.ee}
    volumes:
      # Claude auto-memory, credentials, MCP config — isolated to hr-devs
      - hr-claude-home:/home/ai-teams/.claude
      # Workspace: hr-platform + dev-toolkit repos + node_modules (inside volume)
      - hr-repo:/home/ai-teams/workspace
      # Dynamics data — bind mount from host (read-only).
      # Updated by sync service on host; container always reads current data.
      # Path confirmed on RC server (100.96.54.170) with 6 JSON files (~11MB).
      - /home/dev/github/hr-platform/conversations/docs/temp:/home/ai-teams/dynamics-data:ro
      # WARP CA cert — bind-mount from host (read-only).
      # Required: WARP intercepts HTTPS and re-signs with this corporate CA.
      # Mount to /opt/ — NOT to /etc/ssl/certs/ (see runbook §2).
      - /usr/local/share/ca-certificates/managed-warp.pem:/opt/warp-ca.pem:ro
    ports:
      # Documented here for reference; ignored by Docker with network_mode: host.
      # Services bind directly to host ports.
      - "2225:2225"   # SSH
      - "5178:5178"   # Vite dev server (start with: npm run dev -- --port 5178)
      - "8787:8787"   # Wrangler dev server
    working_dir: /home/ai-teams/workspace/hr-platform/conversations
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  # Claude auto-memory, OAuth credentials, MCP config, team scratchpads.
  # Wipe: docker volume rm hr_hr-claude-home
  hr-claude-home:
    name: hr_hr-claude-home

  # Workspace: hr-platform + dev-toolkit repos + node_modules.
  # Wipe to force re-clone + re-install: docker volume rm hr_hr-repo
  hr-repo:
    name: hr_hr-repo
