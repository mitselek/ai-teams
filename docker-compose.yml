# Claude Code Agent Team — Docker Compose — Full Isolation (*FR:Brunel*)
#
# Usage:
#   ./session-start.sh framework-research   # start framework-research team
#   ./session-start.sh comms-dev            # start comms-dev team
#   ./session-start.sh                      # defaults to framework-research
#   ./session-stop.sh                       # stop all containers, preserve volumes
#
# Container layout (both teams, same image):
#   User:        ai-teams  (uid=1000)
#   $HOME:       /home/ai-teams/
#   ~/.claude/:  /home/ai-teams/.claude/    → per-team named volume (auto-memory)
#   Repo:        /home/ai-teams/workspace/  → shared named volume (same repo, both teams)
#   Comms:       /shared/comms/             → shared volume (Unix domain sockets, broker sidecars)
#   Inbox:       /team-data/inbox/          → per-team named volume (broker message queue)
#
# NO bind mounts to host filesystem (PO requirement).
#
# Broker sidecars (per Herald's Protocol 4 decision, 2026-03-14):
#   Each team has a broker-<team> sidecar that owns the team's UDS socket.
#   The Claude container depends_on the broker being healthy (socket exists).
#   Broker uses per-team inbox volume for message persistence across broker restarts.
#   TLS-PSK via Docker secrets (comms-psk) — shared symmetric key, 256-bit.
#   NOTE: broker image is a placeholder (comms-dev team delivers the implementation).

x-broker-base: &broker-base
  image: ai-teams-broker:latest  # built by comms-dev team
  volumes:
    - comms:/shared/comms
  environment:
    - COMMS_PSK_FILE=/run/secrets/comms-psk
  secrets:
    - comms-psk
  restart: unless-stopped

x-team-base: &team-base
  build:
    context: .
    args:
      GIT_USER_NAME: "${GIT_USER_NAME:-mitselek}"
      GIT_USER_EMAIL: "${GIT_USER_EMAIL:-mihkel.putrinsh@gmail.com}"
  image: ai-teams-claude:latest
  environment:
    - HOME=/home/ai-teams
    - TZ=Europe/Tallinn
    - REPO_URL=${REPO_URL:-https://github.com/mitselek/ai-teams.git}
    - GITHUB_TOKEN=${GITHUB_TOKEN}
    - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    - CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1
  volumes:
    # Repo: shared between both teams — same codebase, pulled once per session
    - repo-data:/home/ai-teams/workspace
    # Inter-team comms: Unix domain sockets at /shared/comms/
    - comms:/shared/comms
  secrets:
    - comms-psk
  working_dir: /home/ai-teams/workspace
  stdin_open: true
  tty: true

services:

  # ── Broker sidecars ──────────────────────────────────────────────────────────
  # Start before Claude containers. Claude containers depend_on broker healthy.
  # Broker persists queued messages to per-team inbox volume across restarts.

  broker-framework-research:
    <<: *broker-base
    volumes:
      - comms:/shared/comms
      - fr-broker-inbox:/team-data/inbox
    environment:
      - COMMS_PSK_FILE=/run/secrets/comms-psk
      - TEAM_NAME=framework-research
      - SOCKET_PATH=/shared/comms/framework-research.sock
      - INBOX_DIR=/team-data/inbox
    healthcheck:
      test: ["CMD", "test", "-S", "/shared/comms/framework-research.sock"]
      interval: 2s
      timeout: 1s
      retries: 5

  broker-comms-dev:
    <<: *broker-base
    volumes:
      - comms:/shared/comms
      - cd-broker-inbox:/team-data/inbox
    environment:
      - COMMS_PSK_FILE=/run/secrets/comms-psk
      - TEAM_NAME=comms-dev
      - SOCKET_PATH=/shared/comms/comms-dev.sock
      - INBOX_DIR=/team-data/inbox
    healthcheck:
      test: ["CMD", "test", "-S", "/shared/comms/comms-dev.sock"]
      interval: 2s
      timeout: 1s
      retries: 5

  # ── Claude team containers ───────────────────────────────────────────────────

  framework-research:
    <<: *team-base
    depends_on:
      broker-framework-research:
        condition: service_healthy
    volumes:
      # Auto-memory: isolated per team
      - fr-claude-home:/home/ai-teams/.claude
      # Inherited from base (repo + comms)
      - repo-data:/home/ai-teams/workspace
      - comms:/shared/comms
    secrets:
      - comms-psk
    environment:
      - HOME=/home/ai-teams
      - TZ=Europe/Tallinn
      - REPO_URL=${REPO_URL:-https://github.com/mitselek/ai-teams.git}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1
      - TEAM_NAME=framework-research

  comms-dev:
    <<: *team-base
    depends_on:
      broker-comms-dev:
        condition: service_healthy
    volumes:
      # Auto-memory: isolated per team
      - cd-claude-home:/home/ai-teams/.claude
      # Inherited from base (repo + comms)
      - repo-data:/home/ai-teams/workspace
      - comms:/shared/comms
    secrets:
      - comms-psk
    environment:
      - HOME=/home/ai-teams
      - TZ=Europe/Tallinn
      - REPO_URL=${REPO_URL:-https://github.com/mitselek/ai-teams.git}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1
      - TEAM_NAME=comms-dev

volumes:
  # Per-team auto-memory volumes (~/.claude/)
  # Wipe intentionally: docker volume rm ai-teams_fr-claude-home
  fr-claude-home:
    name: ai-teams_fr-claude-home

  cd-claude-home:
    name: ai-teams_cd-claude-home

  # Shared repo — both teams read/write the same clone
  # Wipe to force re-clone: docker volume rm ai-teams_repo-data
  repo-data:
    name: ai-teams_repo-data

  # Inter-team communication via Unix domain sockets (broker sidecars)
  # Mounted at /shared/comms/ in all broker and Claude containers
  comms:
    name: ai-teams_comms

  # Per-team broker inbox — persists queued messages across broker restarts
  # Owned by broker sidecar; not mounted in Claude container
  fr-broker-inbox:
    name: ai-teams_fr-broker-inbox

  cd-broker-inbox:
    name: ai-teams_cd-broker-inbox

secrets:
  # Pre-shared key for inter-team message encryption.
  # Mounted at /run/secrets/comms-psk in broker containers.
  #
  # To provision for a test session:
  #   mkdir -p secrets && openssl rand -hex 32 > secrets/comms-psk.key
  #
  # Or set COMMS_PSK_FILE env var to point at an existing key file.
  comms-psk:
    file: ${COMMS_PSK_FILE:-./secrets/comms-psk.key}
