# Claude Code Agent Team — Docker Compose — Full Isolation (*FR:Brunel*)
#
# One command to start: ./session-start.sh
# One command to stop:  ./session-stop.sh   (preserves named volumes)
#
# Layout inside container:
#   User:        ai-teams  (uid=1000)
#   $HOME:       /home/ai-teams/
#   ~/.claude/:  /home/ai-teams/.claude/    → claude-home volume (auto-memory)
#   Repo:        /home/ai-teams/workspace/  → repo-data volume (git-tracked config)
#
# NO bind mounts to host filesystem (PO requirement).

services:
  session:
    build:
      context: .
      args:
        GIT_USER_NAME: "${GIT_USER_NAME:-mitselek}"
        GIT_USER_EMAIL: "${GIT_USER_EMAIL:-mihkel.putrinsh@gmail.com}"
    image: ai-teams-claude:latest
    environment:
      - HOME=/home/ai-teams
      # Git credentials and repo URL
      - REPO_URL=${REPO_URL:-https://github.com/mitselek/ai-teams.git}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      # Claude API key
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Required for agent teams feature
      - CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1
    volumes:
      # Auto-memory: ~/.claude/ persists across container restarts
      - claude-home:/home/ai-teams/.claude

      # Repo: git clone lives here, pulled fresh at each session start
      - repo-data:/home/ai-teams/workspace

    working_dir: /home/ai-teams/workspace
    stdin_open: true
    tty: true

volumes:
  # ~/.claude/ — Claude auto-memory, settings, runtime team dirs
  # Wipe only intentionally: docker volume rm ai-teams_claude-home
  claude-home:
    name: ai-teams_claude-home

  # Repo data — cloned at first start, pulled on subsequent starts
  # Wipe to force re-clone: docker volume rm ai-teams_repo-data
  repo-data:
    name: ai-teams_repo-data
